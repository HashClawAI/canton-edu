# Reminder only: Cursor Agent cannot run on GitHub-hosted runners.
# Runs twice daily (~08:45 & ~20:45 CST). Opens one Issue per UTC slot so maintainers run the Agent locally and open a Draft PR.
name: Scheduled content — agent reminder

on:
  schedule:
    - cron: '45 */12 * * *'
  workflow_dispatch:

permissions:
  issues: write

concurrency:
  group: scheduled-content-reminder
  cancel-in-progress: true

jobs:
  open-reminder-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create reminder issue if none for this slot
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const d = new Date();
            const utcHour = d.getUTCHours();
            const slotHour = utcHour < 12 ? 0 : 12;
            const dateStr = d.toISOString().slice(0, 10);
            const title = `[content run] Canton edu — ${dateStr} ${String(slotHour).padStart(2, '0')}:00 UTC`;
            const { data: open } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            if (open.some((i) => i.title === title)) {
              core.info('Skipping: reminder issue for this UTC slot already exists.');
              return;
            }
            let body = fs.readFileSync('.github/SCHEDULED_AGENT_RUN.md', 'utf8');
            body =
              `**Opened (UTC):** ${new Date().toISOString()}\n\n` +
              '_Schedule: twice daily (~every 12 hours). Close after you ran the Cursor agent skill and opened a Draft PR._\n\n' +
              body;
            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });
