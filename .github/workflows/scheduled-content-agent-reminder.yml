# Reminder only: Cursor Agent cannot run on GitHub-hosted runners.
# 20:30 Asia/Shanghai (GMT+8) ≈ 12:30 UTC — offset from RSS scan at 12:00 UTC.
name: Scheduled content — agent reminder

on:
  schedule:
    - cron: '30 12 * * *'
  workflow_dispatch:

permissions:
  issues: write

concurrency:
  group: scheduled-content-reminder
  cancel-in-progress: true

jobs:
  open-reminder-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create reminder issue if none open
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const { data: open } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            if (open.some((i) => i.title.startsWith('[content run]'))) {
              core.info('Skipping: an open [content run] issue already exists.');
              return;
            }
            let body = fs.readFileSync('.github/SCHEDULED_AGENT_RUN.md', 'utf8');
            body =
              `**Opened (UTC):** ${new Date().toISOString()}\n\n` +
              '_This issue was opened by the scheduled workflow. Close it after you finish the Cursor agent run and opened a Draft PR._\n\n' +
              body;
            await github.rest.issues.create({
              owner,
              repo,
              title: `[content run] Canton edu — scheduled agent + human publish (${new Date().toISOString().slice(0, 10)})`,
              body,
            });
