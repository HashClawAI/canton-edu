name: Canton news (RSS scan)

# Twice daily (~08:15 & ~20:15 CST): RSS candidates vs translations.ts.
# Offset after deploy (:00 UTC) so CI artifacts align with scheduled Pages builds.
on:
  schedule:
    - cron: '15 */12 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: canton-news-scan
  cancel-in-progress: true

jobs:
  rss-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scan RSS vs translations
        id: scan
        run: node scripts/news-rss-scan.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Open triage issue if there are new candidates
        if: steps.scan.outputs.has_candidates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const d = new Date();
            const utcHour = d.getUTCHours();
            const slotHour = utcHour < 12 ? 0 : 12;
            const dateStr = d.toISOString().slice(0, 10);
            const title = `[news scan] Canton RSS candidates — ${dateStr} ${String(slotHour).padStart(2, '0')}:00 UTC`;
            const { data: open } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 50,
            });
            if (open.some((i) => i.title === title)) {
              core.info('Skipping: an issue for this UTC slot already exists.');
              return;
            }
            const body = fs.readFileSync('news-candidates.md', 'utf8');
            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });
