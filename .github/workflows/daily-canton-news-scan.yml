name: Daily Canton news (RSS scan)

# 20:00 Asia/Shanghai (GMT+8) = 12:00 UTC. GitHub Actions may start within ~1 hour.
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: canton-news-scan
  cancel-in-progress: true

jobs:
  rss-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scan RSS vs translations
        id: scan
        run: node scripts/news-rss-scan.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Open triage issue if there are new candidates
        if: steps.scan.outputs.has_candidates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const { data: open } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 50,
            });
            if (open.some((i) => i.title.startsWith('[news scan]'))) {
              core.info('Skipping: an open [news scan] issue already exists.');
              return;
            }
            const body = fs.readFileSync('news-candidates.md', 'utf8');
            await github.rest.issues.create({
              owner,
              repo,
              title: `[news scan] Canton RSS candidates ${new Date().toISOString().slice(0, 10)}`,
              body,
            });
