name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily 20:00 Asia/Shanghai (GMT+8) = 12:00 UTC — full rebuild + Pages deploy (chart, CIP topics, news stamp, all routes).
    # GitHub Actions scheduled runs may start within ~1 hour after the cron minute.
    - cron: '0 12 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # Custom domain https://hashclaw.ai/ — see public/CNAME and GitHub Pages settings.
      - name: Install and build
        env:
          BASE_PATH: /
          PUBLIC_SITE_URL: https://hashclaw.ai
          # Optional repo secret: Groups.io API key (Bearer) for cip-discuss topics at build time.
          GROUPSIO_API_KEY: ${{ secrets.GROUPSIO_API_KEY }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
